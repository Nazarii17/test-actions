name: 'Build Project'
description: 'Install dependencies and build the application'

inputs:
  working-directory:
    description: 'The directory of the app'
    required: true
  artifact-name:
    description: 'Name of the uploaded artifact'
    required: true

outputs:
  script-file:
    description: 'Built JS asset filename'
    value: ${{ steps.publish.outputs.script-file }}

runs:
  using: 'composite'
  steps:
    - name: Install dependencies
      run: npm ci
      working-directory: ${{ inputs.working-directory }}
      shell: bash

    - name: Build website
      run: npm run build
      working-directory: ${{ inputs.working-directory }}
      shell: bash

    - name: Publish JS filename
      id: publish
      run: |
        FILE=$(ls dist/assets/*.js | head -n 1)
        echo "script-file=$FILE" >> "$GITHUB_OUTPUT"
      working-directory: ${{ inputs.working-directory }}
      shell: bash

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ inputs.working-directory }}/dist
