name: 'Deploy Project'
description: 'Deploy the application'

inputs:
  working-directory:
    description: 'The directory of the app'
    required: true

  artifact-name:
    description: 'Name of the downloaded artifact'
    required: true

  script-file:
    description: 'Built JS asset filename (relative to dist)'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Get build artifacts
      uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ inputs.working-directory }}/dist

    - name: Verify artifact contents
      run: |
        echo "Artifact contents:"
        ls -R dist
      working-directory: ${{ inputs.working-directory }}
      shell: bash

    - name: Deploy
      run: |
        echo "Deploying JS file: dist/${{ inputs.script-file }}"
        # real example:
        # aws s3 cp dist/${{ inputs.script-file }} s3://my-bucket/
      working-directory: ${{ inputs.working-directory }}
      shell: bash