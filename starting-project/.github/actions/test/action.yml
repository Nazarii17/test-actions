name: 'Test Project'
description: 'Install dependencies, lint, and run tests'

inputs:
  working-directory:
    description: 'The directory of the app'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Cache node_modules
      id: cache-deps
      uses: actions/cache@v4
      with:
        path: ${{ inputs.working-directory }}/node_modules
        key: ${{ runner.os }}-node-${{ hashFiles(format('{0}/package-lock.json', inputs.working-directory)) }}

    - name: Install dependencies
      if: steps.cache-deps.outputs.cache-hit != 'true'
      run: npm ci
      working-directory: ${{ inputs.working-directory }}
      shell: bash

    - name: Lint code
      run: npm run lint
      working-directory: ${{ inputs.working-directory }}
      shell: bash

    - name: Test code
      run: npm run test
      working-directory: ${{ inputs.working-directory }}
      shell: bash