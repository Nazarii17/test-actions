name: 'Test Project'
description: 'Install dependencies, lint, and run tests'

inputs:
  working-directory:
    description: 'The directory of the app'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Install dependencies
      run: npm ci
      working-directory: ${{ inputs.working-directory }}
      shell: bash

    - name: Lint code
      run: npm run lint
      working-directory: ${{ inputs.working-directory }}
      shell: bash

    - name: Test code
      run: npm run test
      working-directory: ${{ inputs.working-directory }}
      shell: bash