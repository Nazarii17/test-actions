name: React CI Trigger

on:
  push:
    paths:
      - 'second-action-react/**'
  workflow_dispatch:

jobs:
  test-project:
    runs-on: ubuntu-latest
    steps:
      - name: Download code
        uses: actions/checkout@v4

      - name: Run React tests
        uses: ./second-action-react/.github/actions/test-project
        with:
          node-version: '24'
          working-directory: './second-action-react'

  deploy-project:
    needs: test-project
    runs-on: ubuntu-latest
    steps:
      - name: Download code
        uses: actions/checkout@v4

      - name: Run dummy deploy
        uses: ./second-action-react/.github/actions/deploy
        with:
          working-directory: './second-action-react'
