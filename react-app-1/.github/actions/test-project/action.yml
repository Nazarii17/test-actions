name: 'React CI Pipeline'
description: 'A professional composite action for automated testing of React applications'
author: 'Nazarii Tkachuk'

inputs:
  node-version:
    description: 'The Node.js version to use'
    required: false
    default: '24'
  working-directory:
    description: 'The directory where the React project is located'
    required: false
    default: './second-action-react'

runs:
  using: 'composite'
  steps:
    - name: 🏗️ Setup Node.js ${{ inputs.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'npm'
        cache-dependency-path: '${{ inputs.working-directory }}/package-lock.json'

    - name: 📦 Install dependencies
      run: npm ci
      shell: bash
      working-directory: ${{ inputs.working-directory }}

    - name: 🧪 Run tests
      run: npm test -- --passWithNoTests
      shell: bash
      working-directory: ${{ inputs.working-directory }}

