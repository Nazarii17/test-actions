name: 'React CI Pipeline'
description: 'A professional composite action for automated lint of React applications'
author: 'Nazarii Tkachuk'

runs:
  using: 'composite'
  steps:
    - name: Output event data
      run: echo "${{ toJSON(github.event) }}"
      shell: bash
    - name: Install dependencies
      run: npm ci
      shell: bash
    - name: Test code
      run: npm run test
      shell: bash
    - name: Build code
      run: npm run build
      shell: bash
    - name: Deploy project
      run: echo "Deploying..."
      shell: bash