name: Test Project
description: "Composite action to install dependencies and run tests for the React project"

runs:
  using: "composite"
  steps:
    - name: Install NodeJs
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm ci
      shell: bash
      working-directory: ${{ github.action_path }}

    - name: Run tests
      run: npm test
      shell: bash
      working-directory: ${{ github.action_path }}
